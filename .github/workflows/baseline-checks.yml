name: Baseline Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Django system check (test settings)
        run: python3 manage.py check --settings=medprep.settings_test

      - name: Run automated pytest suite
        run: pytest -q tests/automated

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm ci

      - name: Node syntax checks (Playwright files)
        run: |
          node --check playwright.config.js
          node --check playwright/tests/public-smoke.spec.js
          node --check playwright/tests/student-flows.spec.js
          node --check playwright/tests/staff-smoke.spec.js
