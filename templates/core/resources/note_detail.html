{% extends 'base.html' %}

{% block title %}{{ note.title }} - MedPrep{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <article class="card shadow-sm">
                <div class="card-body">
                    <p class="text-muted">{{ note.topic.subject.name }} / {{ note.topic.name }}</p>
                    <h1 class="h2">{{ note.title }}</h1>
                    <div class="mt-4">{{ note.content|linebreaks }}</div>
                </div>
            </article>
        </div>
    </div>
</section>
{% endblock %}
