{% extends 'base.html' %}

{% block title %}Start Quiz - MedPrep{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h1 class="h3 mb-1">Start Quiz</h1>
                    <p class="text-muted mb-0">{{ topic.subject.name }} / {{ topic.name }}</p>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">Start Quiz</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
